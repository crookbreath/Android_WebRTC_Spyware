name: Build SpyDroid Autostream APK

on:
  push:
    branches:
      - autostream # Triggers only for this branch
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # This branch sometimes requires a clean build to link WebRTC libraries correctly
      - name: Clean and Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload Autostream APK
        uses: actions/upload-artifact@v4
        with:
          name: SpyDroid-Autostream-Target
          path: app/build/outputs/apk/debug/app-debug.apk
