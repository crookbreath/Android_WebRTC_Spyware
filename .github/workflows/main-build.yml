name: Build SpyDroid Main APK

on:
  push:
    branches:
      - main  # Set this to your specific branch name if it's different
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Clean and Build Main APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload Main APK
        uses: actions/upload-artifact@v4
        with:
          name: SpyDroid-Main-Variant
          path: app/build/outputs/apk/debug/app-debug.apk
